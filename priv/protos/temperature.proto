syntax = "proto3";

import "google/api/annotations.proto";

package ThermostatNerves;

message Empty {}

message UnitRequest {
	string unit = 1;  // "C" for Celsius, "F" for Fahrenheit
}

message TimezoneRequest {
	string timezone = 1;  // IANA timezone string e.g. "America/Denver"
}

message TimezoneList {
	repeated string timezones = 1;
}

service RPC {
	rpc sendTemperature(Empty) returns (TemperatureReading) {
		option (google.api.http) = {
			get: "/temperature"
		};
	}

	rpc streamTemperature(Empty) returns (stream TemperatureReading) {}

	rpc setUnit(UnitRequest) returns (Empty) {
		option (google.api.http) = {
			post: "/unit"
			body: "*"
		};
	}

	rpc setTimezone(TimezoneRequest) returns (Empty) {
		option (google.api.http) = {
			post: "/timezone"
			body: "*"
		};
	}

	rpc getTimezones(Empty) returns (TimezoneList) {
		option (google.api.http) = {
			get: "/timezones"
		};
	}
}

message TemperatureReading {
	float value = 1;  // Temperature value
	string unit = 2;  // "C" for Celsius, "F" for Fahrenheit
}

